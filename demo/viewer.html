function loadData() {
  allData = window._EMBEDDED_DATA.signals || (Array.isArray(window._EMBEDDED_DATA) ? window._EMBEDDED_DATA : []);
  window._rawRunTs = window._EMBEDDED_DATA.run_timestamp || '';
  allB2b = window._EMBEDDED_B2B_DATA.companies || (Array.isArray(window._EMBEDDED_B2B_DATA) ? window._EMBEDDED_B2B_DATA : []);
  document.getElementById('count-signals').textContent = allData.length;
  document.getElementById('count-b2b').textContent = allB2b.length;
  initSignalFilters();
  initB2bFilters();
  updateQuotaBars();
  checkServerStatus();
  renderSignals();
}

function checkServerStatus() {
  fetch(SERVER + '/api/quota')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      serverOnline = true;
      window._EMAIL_STATS = data;
      updateQuotaBars();
      // Enable send buttons if there are candidates with email
      var hasEmailSig = allData.some(function(s) { return s.contact_email && !s.contacted; });
      var hasEmailB2b = allB2b.some(function(c) { return c.contact_email && !c.contacted; });
      document.getElementById('send-all-signals').disabled = !hasEmailSig || !data.ok;
      document.getElementById('send-all-b2b').disabled = !hasEmailB2b || !data.ok;
    })
    .catch(function() {
      serverOnline = false;
      document.getElementById('send-all-signals').disabled = true;
      document.getElementById('send-all-b2b').disabled = true;
      document.getElementById('status-signals').className = 'send-status error';
      document.getElementById('status-signals').textContent = 'Server offline — 请先启动 python server.py';
      document.getElementById('status-b2b').className = 'send-status error';
      document.getElementById('status-b2b').textContent = 'Server offline — 请先启动 python server.py';
    });
}

function updateQuotaBars() {
  if (serverOnline) {
    fetch(SERVER + '/api/quota')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        window._EMAIL_STATS = data;
        _renderQuotaBars(data);
      })
      .catch(function() {
        _renderQuotaBars(window._EMAIL_STATS || {sent_today: 0, daily_limit: 30, remaining: 30});
      });
  } else {
    _renderQuotaBars(window._EMAIL_STATS || {sent_today: 0, daily_limit: 30, remaining: 30});
  }
}

function _renderQuotaBars(stats) {
  var sent = stats.sent_today || 0;
  var limit = stats.daily_limit || 30;
  var remaining = stats.remaining || 30;
  var pct = Math.min(100, Math.round((sent / limit) * 100));

  ['signals', 'b2b'].forEach(function(panel) {
    var bar = document.getElementById('quota-bar-' + panel);
    if (bar) {
      bar.style.display = '';
      document.getElementById('quota-text-' + panel).textContent = sent + '/' + limit + ' (剩余 ' + remaining + ')';
      var fill = document.getElementById('quota-fill-' + panel);
      fill.style.width = pct + '%';
      fill.className = 'progress-fill' + (pct >= 90 ? ' danger' : pct >= 70 ? ' warning' : '');
    }
  });
}

function isEmailSent(sourceUrl) {
  return localStorage.getItem('email_sent:' + sourceUrl) === 'true';
}
function markEmailSent(sourceUrl) {
  localStorage.setItem('email_sent:' + sourceUrl, 'true');
}

// ─── Preview Email ────────────────────────────────────────────────────────
function previewEmail(sourceUrl, sourceType, btnEl) {
  if (!serverOnline) {
    alert('邮件服务器未连接。请先启动: python server.py');
    return;
  }
  var previewId = 'preview-' + sourceUrl.replace(/[^a-zA-Z0-9]/g, '').substring(0,30);
  var previewEl = document.getElementById(previewId);
  if (!previewEl) return;

  // Toggle: if already open and has content, close it
  if (previewEl.classList.contains('open') && previewEl.innerHTML) {
    previewEl.classList.remove('open');
    previewEl.innerHTML = '';
    return;
  }

  btnEl.classList.add('loading');
  previewEl.innerHTML = '<div style="padding:12px;color:var(--text-secondary);font-size:13px;">正在生成开发信，请稍候...</div>';
  previewEl.classList.add('open');

  fetch(SERVER + '/api/preview-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source_url: sourceUrl, source_type: sourceType })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btnEl.classList.remove('loading');
    if (!data.ok) {
      previewEl.innerHTML = '<div style="padding:12px;color:var(--danger-text);font-size:13px;">生成失败: ' + esc(data.error || '未知错误') + '</div>';
      return;
    }
    previewEl.innerHTML =
      '<div class="preview-header">' +
        '<span class="preview-lang-tag">' + esc(data.language || data.lang_code || 'English') + '</span>' +
        '<span style="font-size:12px;color:var(--text-secondary);">点击发送后会发出以下内容</span>' +
      '</div>' +
      '<div class="preview-subject">主题: ' + esc(data.subject || '无主题') + '</div>' +
      '<div class="preview-body">' + esc(data.body || '').replace(/\n/g, '<br>') + '</div>' +
      '<div class="preview-actions">' +
        '<button class="copy-btn" onclick="copyPreview(this,\'' + escAttr(data.body || '') + '\')">复制全文</button>' +
      '</div>';
  })
  .catch(function(err) {
    btnEl.classList.remove('loading');
    previewEl.innerHTML = '<div style="padding:12px;color:var(--danger-text);font-size:13px;">请求失败，请检查服务器是否运行</div>';
  });
}

function copyPreview(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = '已复制'; btn.classList.add('copied');
    setTimeout(function() { btn.textContent = '复制全文'; btn.classList.remove('copied'); }, 2000);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '已复制'; btn.classList.add('copied');
    setTimeout(function() { btn.textContent = '复制全文'; btn.classList.remove('copied'); }, 2000);
  });
}

function sendEmailAJAX(sourceUrl, sourceType, btnEl) {
  if (!serverOnline) {
    alert('邮件服务器未连接。请先启动: python server.py');
    return;
  }
  btnEl.disabled = true;
  btnEl.textContent = '发送中...';

  fetch(SERVER + '/api/send-one', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({source_url: sourceUrl, source_type: sourceType})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) {
      btnEl.classList.add('sent');
      btnEl.textContent = '已发送 (' + (data.language || '') + ')';
      btnEl.disabled = false;
      markEmailSent(sourceUrl);
      updateQuotaBars();
    } else {
      btnEl.textContent = '失败';
      btnEl.style.color = 'var(--danger-text)';
      btnEl.style.borderColor = 'var(--danger-text)';
      setTimeout(function() {
        btnEl.disabled = false;
        btnEl.textContent = '重试';
      }, 3000);
    }
  })
  .catch(function(err) {
    btnEl.textContent = '错误';
    btnEl.style.color = 'var(--danger-text)';
    setTimeout(function() {
      btnEl.disabled = false;
      btnEl.textContent = '重试';
    }, 3000);
  });
}

function sendAllEmails(pipeline) {
  if (!serverOnline) {
    alert('邮件服务器未连接。请先启动: python server.py');
    return;
  }

  var items = pipeline === 'signals' ? allData : allB2b;
  var sourceType = pipeline === 'signals' ? 'signal' : 'b2b';
  var toSend = items.filter(function(item) {
    return item.contact_email && !item.contacted && !isEmailSent(item.source_url);
  });

  if (toSend.length === 0) {
    alert('没有可发送的邮件');
    return;
  }

  if (!confirm('将发送 ' + toSend.length + ' 封邮件，确认？')) return;

  var btn = document.getElementById('send-all-' + pipeline);
  var progressDiv = document.getElementById('progress-' + pipeline);
  var progressText = document.getElementById('progress-text-' + pipeline);
  var progressBar = document.getElementById('progress-bar-' + pipeline);
  var statusEl = document.getElementById('status-' + pipeline);

  btn.disabled = true; btn.textContent = '发送中...';
  progressDiv.style.display = 'block';
  statusEl.textContent = '';
  statusEl.className = 'send-status';

  var batchItems = toSend.map(function(item) {
    return {source_url: item.source_url, source_type: sourceType};
  });

  // Track progress locally while server processes batch
  var total = toSend.length;
  progressText.textContent = '0/' + total + ' 发送中...';
  progressBar.style.width = '0%';

  fetch(SERVER + '/api/send-batch', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({items: batchItems})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    // Mark all as sent locally
    toSend.forEach(function(item) {
      markEmailSent(item.source_url);
    });
    // Also mark in data arrays
    items.forEach(function(item) {
      var wasSent = toSend.some(function(ts) { return ts.source_url === item.source_url; });
      if (wasSent) {
        item.contacted = true;
        item.contacted_at = new Date().toISOString();
      }
    });

    progressText.textContent = data.sent + '/' + total + ' 已发送, ' + data.failed + ' 失败';
    progressBar.style.width = '100%';
    statusEl.className = 'send-status success';
    statusEl.textContent = data.sent + ' 封已发送, 剩余额度 ' + (data.remaining || 0);
    btn.textContent = '发送完成';
    btn.style.background = 'var(--success-bg)';
    btn.style.color = 'var(--success-text)';
    btn.style.borderColor = 'var(--success-text)';

    updateQuotaBars();
    if (pipeline === 'signals') renderSignals(); else renderB2b();
  })
  .catch(function(err) {
    progressText.textContent = '发送出错: ' + (err.message || '连接失败');
    statusEl.className = 'send-status error';
    statusEl.textContent = '发送失败，请重试';
    btn.disabled = false;
    btn.textContent = '重试发送';
  });
}

// ─── Refresh B2B Pipeline (full re-scrape) ───────────────────────────────
var _refreshPollTimer = null;

function refreshB2b() {
  var btn = document.getElementById('refresh-b2b-btn');
  var statusEl = document.getElementById('status-b2b');

  if (!serverOnline) {
    alert('服务器未连接。请先启动: python server.py');
    return;
  }

  btn.disabled = true;
  btn.textContent = '刷新中...';
  btn.style.opacity = '0.6';
  statusEl.className = 'send-status';
  statusEl.textContent = '正在启动B2B刷新...';

  var progressDiv = document.getElementById('refresh-progress-b2b');
  var progressText = document.getElementById('refresh-text-b2b');
  var progressBar = document.getElementById('refresh-bar-b2b');
  progressDiv.style.display = 'block';
  progressText.textContent = '正在启动...';
  progressBar.style.width = '0%';

  fetch(SERVER + '/api/refresh-b2b', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) {
        if (data.status === 'running') {
          statusEl.textContent = '刷新已在进行中...';
        } else {
          btn.disabled = false;
          btn.textContent = '刷新B2B商家';
          btn.style.opacity = '';
          progressDiv.style.display = 'none';
          statusEl.className = 'send-status error';
          statusEl.textContent = '启动失败: ' + (data.error || '未知错误');
          alert('刷新失败: ' + (data.error || '未知错误'));
          return;
        }
      }
      statusEl.textContent = '刷新已启动，请稍候...';
      startRefreshPoll();
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '刷新B2B商家';
      btn.style.opacity = '';
      progressDiv.style.display = 'none';
      statusEl.className = 'send-status error';
      statusEl.textContent = '连接失败: ' + (err.message || '');
    });
}

function startRefreshPoll() {
  if (_refreshPollTimer) clearInterval(_refreshPollTimer);
  _refreshPollTimer = setInterval(pollRefreshStatus, 2500);
  pollRefreshStatus();
}

function pollRefreshStatus() {
  var btn = document.getElementById('refresh-b2b-btn');
  var statusEl = document.getElementById('status-b2b');
  var progressDiv = document.getElementById('refresh-progress-b2b');
  var progressText = document.getElementById('refresh-text-b2b');
  var progressBar = document.getElementById('refresh-bar-b2b');

  fetch(SERVER + '/api/refresh-b2b/status')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      progressBar.style.width = (data.progress_pct || 0) + '%';
      progressText.textContent = data.message || '处理中...';

      if (data.status === 'completed') {
        clearInterval(_refreshPollTimer);
        _refreshPollTimer = null;

        btn.disabled = false;
        btn.textContent = '刷新B2B商家';
        btn.style.opacity = '';
        statusEl.className = 'send-status success';
        statusEl.textContent = data.message || '刷新完成';

        progressBar.style.width = '100%';

        // Reload data from server then auto-enable email filter
        reloadB2bData(function() {
          document.getElementById('b2b-filter-email').checked = true;
          renderB2b();
        });

        setTimeout(function() {
          progressDiv.style.display = 'none';
        }, 5000);

      } else if (data.status === 'error') {
        clearInterval(_refreshPollTimer);
        _refreshPollTimer = null;

        btn.disabled = false;
        btn.textContent = '刷新B2B商家';
        btn.style.opacity = '';
        statusEl.className = 'send-status error';
        statusEl.textContent = '刷新失败: ' + (data.error || data.message);

        progressDiv.style.display = 'none';
      }
    })
    .catch(function(err) {
      // Server might be temporarily busy, keep polling
    });
}

function reloadB2bData(callback) {
  fetch(SERVER + '/api/b2b-data')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok && data.companies) {
        window._EMBEDDED_B2B_DATA.companies = data.companies;
        allB2b = data.companies;
        document.getElementById('count-b2b').textContent = allB2b.length;
        initB2bFilters();
        if (callback) callback();
        else renderB2b();
      }
    })
    .catch(function(err) {
      console.error('Failed to reload B2B data:', err);
    });
}

function exportYAMMCsv(pipeline) {
  var items = pipeline === 'signals' ? getFilteredSignals() : getFilteredB2b();
  var rows = [['Email', 'FirstName', 'LastName', 'Company', 'Subject', 'Body', 'SourceURL', 'Priority']];
  items.forEach(function(item) {
    var email = item.contact_email || '';
    if (!email) return;
    var name = item.company_name || item.contact_name || '';
    var parts = name.split(' ');
    var first = parts[0] || '';
    var last = parts.slice(1).join(' ') || '';
    var subject = pipeline === 'signals' ? 'Leeway Parts — ' + (item.part_type || 'Tractor Parts') + ' Inquiry' : 'Leeway Parts — ' + (item.product_focus || 'Agricultural Parts') + ' Partnership';
    var body = item.outreach_draft || '';
    rows.push([email, first, last, name, subject, body.replace(/"/g, '""'), item.source_url || '', (item.priority_score || item.confidence || 0)]);
  });
  
  var csv = rows.map(function(r) {
    return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
  }).join('\n');
  
  var blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'yamm_outreach_' + pipeline + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

}

function initSignalFilters() {
  var cats = new Set(), tags = new Set(), countries = new Set();
  allData.forEach(function(s) {
    if (s.matched_category) cats.add(s.matched_category);
    if (s.tags) s.tags.forEach(function(t) { tags.add(t); });
    if (s.country) countries.add(s.country);
  });
  populateSelect('filter-category', cats);
  populateSelect('filter-tag', tags);
  populateSelect('filter-country', countries);
}

function initB2bFilters() {
  var types = new Set(), countries = new Set();
  allB2b.forEach(function(c) {
    if (c.business_type) types.add(c.business_type);
    if (c.country) countries.add(c.country);
  });
  populateSelect('b2b-filter-type', types);
  populateSelect('b2b-filter-country', countries);
}

function populateSelect(id, values) {
  var sel = document.getElementById(id);
  if (!sel) return;
  var arr = []; values.forEach(function(v) { arr.push(v); });
  arr.sort().forEach(function(v) {
    var opt = document.createElement('option');
    opt.value = v; opt.textContent = v; sel.appendChild(opt);
  });
}

document.getElementById('filter-category').addEventListener('change', renderSignals);

document.getElementById('b2b-filter-country').addEventListener('change', renderB2b);

function getFilteredSignals() {
  var u = document.getElementById('filter-urgency').value;
  var c = document.getElementById('filter-category').value;
  var t = document.getElementById('filter-tag').value;
  var n = document.getElementById('filter-country').value;
  return allData.filter(function(s) {
    if (currentTab === 'pending' && s.contacted) return false;
    if (currentTab === 'contacted' && !s.contacted) return false;
    if (u !== 'all' && s.urgency !== u) return false;
    if (c !== 'all' && s.matched_category !== c) return false;
    if (t !== 'all' && (!s.tags || s.tags.indexOf(t) === -1)) return false;
    if (n !== 'all' && s.country !== n) return false;
    return true;
  });
}

function getFilteredB2b() {
  var t = document.getElementById('b2b-filter-type').value;
  var n = document.getElementById('b2b-filter-country').value;
  var cf = document.getElementById('b2b-filter-conf').value;
  var ef = document.getElementById('b2b-filter-email').checked;
  return allB2b.filter(function(c) {
    if (currentTabB2b === 'pending' && c.contacted) return false;
    if (currentTabB2b === 'contacted' && !c.contacted) return false;
    if (t !== 'all' && c.business_type !== t) return false;
    if (n !== 'all' && c.country !== n) return false;
    if (cf === 'high' && c.confidence < 70) return false;
    if (cf === 'mid' && (c.confidence < 40 || c.confidence >= 70)) return false;
    if (cf === 'low' && c.confidence >= 40) return false;
    if (ef && !c.contact_email) return false;
    return true;
  });
}

function renderSignals() {
  var filtered = getFilteredSignals();
  filtered.sort(function(a, b) {
        var aEmail = a.contact_email ? 1 : 0;
        var bEmail = b.contact_email ? 1 : 0;
        if (aEmail !== bEmail) return bEmail - aEmail;
        return (b.priority_score || 0) - (a.priority_score || 0);
    });
  var ts = allData.length > 0 ? (window._rawRunTs || '') : '';
  document.getElementById('timestamp').textContent = ts ? '数据更新时间: ' + formatTs(ts) : '等待数据...';
  document.getElementById('stat-total').textContent = filtered.length;
  document.getElementById('stat-high').textContent = filtered.filter(function(s) { return s.urgency === 'high'; }).length;
  document.getElementById('stat-med').textContent = filtered.filter(function(s) { return s.urgency === 'medium'; }).length;
  document.getElementById('stat-low').textContent = filtered.filter(function(s) { return s.urgency === 'low'; }).length;
  document.getElementById('filter-count').textContent = '共 ' + filtered.length + ' 条';
  document.getElementById('count-pending').textContent = allData.filter(function(s) { return !s.contacted; }).length;
  document.getElementById('count-contacted').textContent = allData.filter(function(s) { return s.contacted; }).length;

  var container = document.getElementById('cards-container');
  if (filtered.length === 0) { container.innerHTML = '<div class="empty">没有匹配的信号</div>'; return; }

  container.innerHTML = filtered.map(function(s) {
    var urg = s.urgency || 'low';
    var badgeClass = urg;
    var urgLabel = urg.toUpperCase();
    var tags = (s.tags || []).map(function(t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('');
    var country = s.country ? '<span class="tag country">' + esc(s.country) + '</span>' : '';
    var buyer = '';
    if (s.buyer_type && s.buyer_type !== 'unknown') {
      var bMap = {individual_farmer:'个体农户', local_dealer:'本地经销商', repair_shop:'维修厂'};
      buyer = '<span class="tag">' + (bMap[s.buyer_type] || s.buyer_type) + '</span>';
    }
    var category = s.matched_category ? '<span class="tag category">' + esc(s.matched_category) + '</span>' : '';
    var contact = s.contact_method ? '<span class="tag contact">' + esc(s.contact_method) + '</span>' : '';
    var poster = s.poster_username ? '<span class="tag">' + esc(s.poster_username) + '</span>' : '';
    var model = s.machine_model ? '<span class="model">' + esc(s.machine_model) + '</span>' : '';
    var snippet = s.snippet ? '<div class="snippet">' + esc(s.snippet) + '</div>' : '';
    var date = s.post_date ? '<span class="tag" style="font-size:11px">' + esc(s.post_date) + '</span>' : '';
    var urlShort = s.source_url ? s.source_url.replace(/^https?:\/\//, '').substring(0,60) : '';
    var score = s.priority_score != null ? '<span class="score">评分 <strong>' + s.priority_score + '</strong></span>' : '';
        var emailTag = s.contact_email ? '<span class="tag contact">📧 ' + esc(s.contact_email) + '</span>' : '<span class="tag" style="color:#999">无邮箱</span>';
        var emailTag = s.contact_email ? '<span class="tag contact">📧 ' + esc(s.contact_email) + '</span>' : '<span class="tag" style="color:#999">无邮箱</span>';
        var emailTag = s.contact_email ? '<span class="tag contact">📧 ' + esc(s.contact_email) + '</span>' : '<span class="tag" style="color:#999">无邮箱</span>';
    var contactedClass = s.contacted ? ' contacted' : '';

    var emailBtn = '';
    var previewBtn = '<button class="preview-btn" onclick="previewEmail(\'' + escAttr(s.source_url) + '\',\'signal\',this)">预览邮件</button>';
    if (s.contact_email && !s.contacted && !isEmailSent(s.source_url)) {
      emailBtn = '<button class="email-btn" onclick="sendEmailAJAX(\'' + escAttr(s.source_url) + '\',\'signal\',this)">' + escAttr(s.contact_email) + '</button>';
    } else if (s.contact_email && (s.contacted || isEmailSent(s.source_url))) {
      emailBtn = '<span class="email-btn sent">已发送</span>';
    }

    var previewId = 'preview-' + escAttr(s.source_url).replace(/[^a-zA-Z0-9]/g, '').substring(0,30);

    return '<div class="card' + contactedClass + '">' +
      '<div class="card-header">' +
        '<span class="badge ' + badgeClass + '">' + urgLabel + '</span>' +
        '<span class="part-name">' + esc(s.part_type || '未知配件') + '</span>' +
        model + score + emailTag + emailTag + emailTag +
      '</div>' +
      '<div class="card-meta">' + country + buyer + poster + category + contact + date + '</div>' +
      snippet +
      (tags ? '<div class="card-meta" style="margin-bottom:4px">' + tags + '</div>' : '') +
      '<div class="card-actions">' + emailBtn + previewBtn + '</div>' +
      '<div class="preview-section" id="' + previewId + '"></div>' +
      '<div class="url-link"><a href="' + escAttr(s.source_url) + '" target="_blank" rel="noopener">' + esc(urlShort) + '</a></div>' +
    '</div>';
  }).join('');
}

function renderB2b() {
  var filtered = getFilteredB2b();
  filtered.sort(function(a, b) {
        var aEmail = a.contact_email ? 1 : 0;
        var bEmail = b.contact_email ? 1 : 0;
        if (aEmail !== bEmail) return bEmail - aEmail;
        return (b.confidence || 0) - (a.confidence || 0);
    });

  document.getElementById('b2b-stat-total').textContent = filtered.length;
  document.getElementById('b2b-stat-high').textContent = filtered.filter(function(c) { return c.confidence >= 70; }).length;
  document.getElementById('b2b-stat-mid').textContent = filtered.filter(function(c) { return c.confidence >= 40 && c.confidence < 70; }).length;
  document.getElementById('b2b-stat-low').textContent = filtered.filter(function(c) { return c.confidence < 40; }).length;
  document.getElementById('b2b-filter-count').textContent = '共 ' + filtered.length + ' 条';
  document.getElementById('b2b-count-pending').textContent = allB2b.filter(function(c) { return !c.contacted; }).length;
  document.getElementById('b2b-count-contacted').textContent = allB2b.filter(function(c) { return c.contacted; }).length;

  var container = document.getElementById('b2b-cards-container');
  if (filtered.length === 0) { container.innerHTML = '<div class="empty">没有匹配的 B2B 商家</div>'; return; }

  var typeMap = {importer:'进口商',distributor:'分销商',dealer:'经销商',wholesaler:'批发商',trading_company:'贸易公司',agent:'代理商',repair_shop:'维修厂',unknown:'未知'};

  container.innerHTML = filtered.map(function(c) {
    var conf = c.confidence || 0;
    var confClass = conf >= 70 ? 'high' : conf >= 40 ? 'medium' : 'low';
    var confLabel = conf >= 70 ? 'HIGH' : conf >= 40 ? 'MID' : 'LOW';
    var typeLabel = typeMap[c.business_type] || c.business_type || '未知';
    var country = c.country ? '<span class="tag country">' + esc(c.country) + '</span>' : '';
    var bt = '<span class="tag">' + typeLabel + '</span>';
    var website = c.website ? '<span class="tag" style="color:var(--accent)">' + esc(c.website) + '</span>' : '';
    var email = c.contact_email ? '<span class="tag contact">' + esc(c.contact_email) + '</span>' : '';
    var phone = c.phone ? '<span class="tag">' + esc(c.phone) + '</span>' : '';
    var focus = c.product_focus ? '<span class="tag category">' + esc(c.product_focus) + '</span>' : '';
    var snippet = c.snippet ? '<div class="snippet">' + esc(c.snippet) + '</div>' : '';
    var urlShort = c.source_url ? c.source_url.replace(/^https?:\/\//, '').substring(0,60) : '';
    var contactedClass = c.contacted ? ' contacted' : '';
    var hasProduct = c.has_product ? '<span class="tag" style="background:var(--success-bg);color:var(--success-text)">有现货</span>' : '';

    var emailBtn = '';
    var previewBtn = '<button class="preview-btn" onclick="previewEmail(\'' + escAttr(c.source_url) + '\',\'b2b\',this)">预览邮件</button>';
    if (c.contact_email && !c.contacted && !isEmailSent(c.source_url)) {
      emailBtn = '<button class="email-btn" onclick="sendEmailAJAX(\'' + escAttr(c.source_url) + '\',\'b2b\',this)">' + escAttr(c.contact_email) + '</button>';
    } else if (c.contact_email && (c.contacted || isEmailSent(c.source_url))) {
      emailBtn = '<span class="email-btn sent">已发送</span>';
    }

    var previewId = 'preview-' + escAttr(c.source_url).replace(/[^a-zA-Z0-9]/g, '').substring(0,30);

    return '<div class="card' + contactedClass + '">' +
      '<div class="card-header">' +
        '<span class="badge ' + confClass + '">' + confLabel + '</span>' +
        '<span class="part-name">' + esc(c.company_name || '未知公司') + '</span>' +
        '<span class="score">置信度 <strong>' + conf + '</strong></span>' +
      '</div>' +
      '<div class="card-meta">' + country + bt + hasProduct + focus + '</div>' +
      snippet +
      '<div class="card-meta">' + website + email + phone + '</div>' +
      '<div class="card-actions">' + emailBtn + previewBtn + '</div>' +
      '<div class="preview-section" id="' + previewId + '"></div>' +
      '<div class="url-link"><a href="' + escAttr(c.source_url) + '" target="_blank" rel="noopener">' + esc(urlShort) + '</a></div>' +
    '</div>';
  }).join('');
}

function copyDraft(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = '已复制'; btn.classList.add('copied');
    setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '已复制'; btn.classList.add('copied');
    setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatTs(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return iso; }
}

loadData();
</script>
